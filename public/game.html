<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f1a" />
  <title>Treasure Hunt — Game</title>

  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/game.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
  <div id="app" class="page">

    <!-- Top bar -->
    <header class="top-bar">
      <div>
        <div class="top-bar__title">🗺️ Treasure Hunt</div>
        <div id="player-name" style="font-size:13px;opacity:0.7;"></div>
        <div id="player-team"></div>
      </div>
      <div class="top-bar__score">
        <span>Score</span>
        <strong id="player-score">—</strong>
      </div>
    </header>

    <!-- Game paused banner -->
    <div id="game-status-banner"></div>

    <!-- Announcements -->
    <div class="announcements-bar" id="announcements-bar">
      <div id="announcements-list"></div>
    </div>

    <!-- Main content -->
    <main class="page__content">
      <div class="section-heading">Available Tasks</div>
      <div id="task-list">
        <div class="empty-state">Loading tasks…</div>
      </div>
    </main>

    <!-- Bottom navigation -->
    <nav class="bottom-nav" aria-label="Main navigation">
      <span class="bottom-nav__item bottom-nav__item--active">
        <span class="bottom-nav__icon">🏠</span>
        <span>Home</span>
      </span>

      <a class="bottom-nav__scan" href="#" id="btn-scan-qr" aria-label="Scan QR Code">
        <div class="bottom-nav__scan-btn">📷</div>
        <span>Scan QR</span>
      </a>

      <a class="bottom-nav__item" href="/leaderboard.html">
        <span class="bottom-nav__icon">🏆</span>
        <span>Leaderboard</span>
      </a>
    </nav>

  </div><!-- #app -->

  <!-- QR Scanner (html5-qrcode) -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script type="module">
    const scanBtn = document.getElementById('btn-scan-qr');
    let scanner   = null;
    let scanning  = false;

    scanBtn.addEventListener('click', (e) => {
      e.preventDefault();
      if (scanning) { stopScan(); return; }
      openScanUI();
    });

    function openScanUI() {
      const overlay = document.createElement('div');
      overlay.id    = 'qr-overlay';
      overlay.innerHTML = `
        <div style="position:fixed;inset:0;background:#000;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;">
          <p style="color:#fff;margin-bottom:16px;font-weight:600;">Point camera at QR code</p>
          <div id="qr-reader" style="width:300px;max-width:90vw;"></div>
          <button id="btn-stop-scan"
            style="margin-top:20px;padding:10px 24px;background:#6c3ce1;color:#fff;border:none;border-radius:999px;font-size:16px;cursor:pointer;">
            Cancel
          </button>
        </div>
      `;
      document.body.appendChild(overlay);
      document.getElementById('btn-stop-scan').addEventListener('click', stopScan);

      scanner  = new Html5Qrcode('qr-reader');
      scanning = true;
      scanner.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        (decodedText) => {
          stopScan();
          try {
            const url = new URL(decodedText);
            if (url.pathname.startsWith('/task.html') ||
                url.pathname.startsWith('/unlock.html')) {
              window.location.href = decodedText;
            }
          } catch {
            alert('Invalid QR code. Please scan a Treasure Hunt task code.');
          }
        }
      ).catch(() => {
        stopScan();
        alert('Camera not available. Please open the task link manually.');
      });
    }

    function stopScan() {
      if (scanner) { scanner.stop().catch(() => {}); scanner = null; }
      scanning = false;
      const el = document.getElementById('qr-overlay');
      if (el) el.remove();
    }
  </script>

  <script type="module" src="/js/pages/game-page.js"></script>
</body>
</html>
