<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f1a" />
  <title>Treasure Hunt — Photo Gallery</title>

  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/vote.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
  <div id="app" class="page">

    <header class="top-bar">
      <div class="top-bar__title">📸 Photo Gallery</div>
      <a href="/game.html" class="btn btn--ghost btn--sm">← Home</a>
    </header>

    <div id="vote-status-bar" class="vote-status vote-status--closed">Loading…</div>

    <main class="page__content" style="padding:0;">
      <div id="gallery-grid">
        <div class="vote-empty">Loading photos…</div>
      </div>
    </main>

    <nav class="bottom-nav">
      <a class="bottom-nav__item" href="/game.html">
        <span class="bottom-nav__icon">🏠</span>
        <span>Home</span>
      </a>
      <a class="bottom-nav__item" href="/leaderboard.html">
        <span class="bottom-nav__icon">🏆</span>
        <span>Leaderboard</span>
      </a>
      <span class="bottom-nav__item bottom-nav__item--active">
        <span class="bottom-nav__icon">📸</span>
        <span>Vote</span>
      </span>
    </nav>

  </div><!-- #app -->

  <script type="module" src="/js/pages/vote-page.js"></script>
</body>
</html>
