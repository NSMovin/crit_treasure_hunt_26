<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f1a" />
  <title>Treasure Hunt — Task</title>

  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/task.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
  <div id="app" class="page">

    <header id="task-header">
      <a href="/game.html" class="btn btn--ghost btn--sm"
         style="display:inline-flex;margin-bottom:8px;">← Back</a>
      <div class="task-header__row">
        <h1 id="task-title">Loading…</h1>
        <span class="badge" id="task-type"></span>
        <span id="task-points" style="color:var(--clr-accent);font-weight:700"></span>
      </div>
      <div id="task-timer" style="color:var(--clr-text-muted);font-size:13px"></div>
      <div id="task-hint"></div>
    </header>

    <div id="game-container"></div>

  </div><!-- #app -->

  <script type="module" src="/js/pages/task-page.js"></script>
</body>
</html>
