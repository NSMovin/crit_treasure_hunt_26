<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f1a" />
  <title>Treasure Hunt — Leaderboard</title>

  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/leaderboard.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
  <div id="app" class="page">

    <header class="top-bar">
      <div class="top-bar__title">
        🏆 Leaderboard
        <span class="live-dot" title="Live updates"></span>
      </div>
      <a href="/game.html" class="btn btn--ghost btn--sm">← Game</a>
    </header>

    <nav class="tab-bar" role="tablist">
      <button class="tab--active" data-tab="individual" role="tab">Individual</button>
      <button data-tab="team" role="tab">Teams</button>
    </nav>

    <main class="page__content" style="padding:var(--sp-sm)">
      <div id="leaderboard-body">
        <div class="empty-state">Loading scores…</div>
      </div>
    </main>

    <nav class="bottom-nav">
      <a class="bottom-nav__item" href="/game.html">
        <span class="bottom-nav__icon">🏠</span>
        <span>Home</span>
      </a>
      <span class="bottom-nav__item bottom-nav__item--active">
        <span class="bottom-nav__icon">🏆</span>
        <span>Leaderboard</span>
      </span>
    </nav>

  </div><!-- #app -->

  <script type="module" src="/js/pages/leaderboard-page.js"></script>
</body>
</html>
